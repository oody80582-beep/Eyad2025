<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>الألعاب - Eyad Store</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#121212;
            color:white;
            text-align:center;
            margin:0;
        }

        h1{
            color:#00ff99;
        }

        .games{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:20px;
            margin:30px;
        }

        .card{
            background:#1f1f1f;
            width:250px;
            padding:20px;
            border-radius:15px;
        }

        .card img{
            width:100%;
            height:150px;
            object-fit:cover;
            border-radius:10px;
        }

        .btn{
            display:inline-block;
            padding:10px 20px;
            background:#00ff99;
            color:black;
            text-decoration:none;
            border-radius:10px;
        }
    </style>

</head>

<body>

{% include 'includes/navbar.html' %}

<h1>🎮 الألعاب</h1>

<div class="games">

    <div class="card">

        <img src="/static/images/game1.jpg">

        <h2>لعبة تجريبية</h2>

        <p>أفضل لعبة أكشن وتجربة رائعة.</p>

        <a class="btn" href="#">⬇️ تحميل</a>

    </div>


    <div class="card">

        <img src="/static/images/game2.jpg">

        <h2>لعبة جديدة</h2>

        <p>اللعبة ستتوفر قريبًا.</p>

        <a class="btn" href="#">⬇️ تحميل</a>

    </div>

</div>

</body>

</html>
