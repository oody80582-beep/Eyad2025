<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eyad Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
color:white;
}

header{
background:#1f2937;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00ff99;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
font-weight:bold;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:48px;
color:#00ff99;
}

.hero p{
margin-top:20px;
font-size:20px;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#00ff99;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:10px;
}

.games{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:40px;
}

.card{
background:#1f2937;
width:250px;
border-radius:15px;
padding:20px;
text-align:center;
}

.card h3{
margin-bottom:10px;
}

footer{
text-align:center;
padding:20px;
background:#1f2937;
margin-top:50px;
}
</style>

</head>

<body>

<header>

<div class="logo">
🎮 Eyad Store
</div>

<nav>
<a href="/">الرئيسية</a>
<a href="/games">الألعاب</a>
</nav>

</header>

<section class="hero">

<h1>أفضل الألعاب والبرامج</h1>

<p>حمل ألعابك المفضلة بسهولة ومن مكان واحد.</p>

<a href="/games" class="btn">استكشف الألعاب</a>

</section>

<section class="games">

<div class="card">
<h3>🔥 Free Fire</h3>
<p>قريبًا...</p>
</div>

<div class="card">
<h3>🚗 GTA V</h3>
<p>قريبًا...</p>
</div>

<div class="card">
<h3>⚔ PUBG</h3>
<p>قريبًا...</p>
</div>

</section>

<footer>

Eyad Store © 2026

</footer>

</body>
</html>
